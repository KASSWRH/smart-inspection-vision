# Training Configuration
# ========================

training:
  epochs: 100
  imgsz: 640
  batch: 16
  patience: 20           # Early stopping
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01              # Final LR = lr0 * lrf
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1
  data: data/dataset.yaml
  workers: 8
  device: "0"            # GPU index or "cpu"
  amp: true              # Automatic Mixed Precision

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 5.0
  translate: 0.1
  scale: 0.5
  flipud: 0.05
  fliplr: 0.5

validation:
  conf: 0.45
  iou: 0.6
  max_det: 100
